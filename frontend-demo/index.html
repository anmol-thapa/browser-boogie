<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JustDance CV Frontend Demo</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="panel controls">
        <h1>JustDance CV Frontend Demo</h1>

        <section class="control-group">
          <h2>Camera Setup</h2>
          <div class="row two-col">
            <label>
              Model Path
              <input id="modelPath" type="text" value="../pose_landmarker.task" />
            </label>
            <button id="startCameraBtn">Start Camera</button>
          </div>
        </section>

        <section class="control-group">
          <h2>Record And Export</h2>
          <div class="row two-col">
            <label>
              Routine Name
              <input id="routineName" type="text" value="My Routine" />
            </label>
            <label>
              Record FPS
              <input id="recordFps" type="number" min="5" max="60" step="1" value="30" />
            </label>
          </div>

          <div class="row two-col">
            <label>
              Music File
              <input id="audioInput" type="file" accept="audio/*" />
            </label>
            <label>
              Song Preview
              <audio id="audioPlayer" controls preload="metadata"></audio>
            </label>
          </div>

          <div class="row button-row">
            <button id="recordBtn" disabled>Start Recording</button>
            <button id="exportBtn" disabled>Export Package</button>
          </div>

          <div class="row">
            <div class="two-col">
              <label class="inline-check">
                <input id="includeWebcamVideo" type="checkbox" />
                Include webcam video in export
              </label>
              <label>
                Webcam Video Layout
                <select id="webcamVideoLayout">
                  <option value="raw">Raw webcam</option>
                  <option value="side-by-side">Side-by-side (camera + stage)</option>
                </select>
              </label>
            </div>
          </div>
        </section>

        <section class="control-group">
          <h2>Load Routine</h2>
          <div class="row two-col">
            <label>
              Load Routine JSON Or Package ZIP
              <input id="loadRoutineInput" type="file" accept="application/json,.json,application/zip,.zip,application/x-zip-compressed" />
            </label>
            <button id="useRecordedBtn" disabled>Use Last Recording</button>
          </div>
        </section>

        <section class="control-group">
          <h2>Create Routine From Video</h2>
          <div class="row two-col">
            <label>
              Dance Video File
              <input id="routineVideoInput" type="file" accept="video/*" />
            </label>
            <label>
              Analyze FPS
              <input id="videoAnalyzeFps" type="number" min="5" max="30" step="1" value="15" />
            </label>
          </div>
          <div class="row two-col">
            <label>
              Video Routine Compare View
              <select id="videoRoutineCompareView">
                <option value="overlay">Overlay</option>
                <option value="side-by-side">Side-by-side (routine video + webcam)</option>
              </select>
            </label>
          </div>
          <div class="row">
            <video id="routineVideoPreview" class="routine-video-preview" controls preload="metadata"></video>
          </div>
          <div class="row button-row">
            <button id="analyzeVideoBtn">Analyze Video To Routine</button>
            <button id="useVideoRoutineBtn" disabled>Use Video Routine</button>
          </div>
          <p id="videoAnalyzeText" class="mini-status">Video routine: none</p>
        </section>

        <section class="control-group">
          <h2>Compare Settings</h2>
          <div class="row three-col">
            <label>
              Countdown (sec)
              <input id="countdownSec" type="number" min="1" max="30" step="1" value="3" />
            </label>
            <label>
              Match Window (sec)
              <input id="windowSec" type="number" min="0.05" max="1" step="0.05" value="0.2" />
            </label>
            <button id="compareBtn" disabled>Start Compare</button>
          </div>

          <div class="row button-row">
            <button id="stopCompareBtn" disabled>Stop Compare</button>
            <label class="inline-check">
              <input id="blackBackground" type="checkbox" />
              Black background
            </label>
          </div>
        </section>

        <div class="status-block">
          <p id="statusText">Status: idle</p>
          <p id="loadedRoutineText">Loaded routine: none</p>
          <p id="audioText">Audio: none</p>
          <p id="recordedText">Recorded frames: 0</p>
        </div>
      </section>

      <section class="panel viewer">
        <div class="hud">
          <div><span>Score:</span> <strong id="scoreValue">0.0</strong></div>
          <div><span>Label:</span> <strong id="labelValue">Miss</strong></div>
          <div><span>Combo:</span> <strong id="comboValue">0</strong></div>
          <div><span>Time:</span> <strong id="timeValue">0.00s</strong></div>
          <div><span>Countdown:</span> <strong id="countdownValue">-</strong></div>
        </div>
        <div class="stage" id="stage">
          <video id="video" autoplay playsinline muted></video>
          <canvas id="overlay"></canvas>
        </div>
      </section>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
